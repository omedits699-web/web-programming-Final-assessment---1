<!DOCTYPE html>
<html lang="en">

<head>
    <!-- basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- page title -->
    <title>Petrol Calculator</title>

    <!-- connecting css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- main calculator container -->
    <div class="container">

        <!-- heading section -->
        <h1>Petrol Calculator</h1>
        <p class="subtitle">Calculate your fuel cost easily</p>

        <!-- Petrol price input -->
        <div class="input-group">

            <label for="pricePerLiter">
                Petrol Price Per Liter (SR)
            </label>

            <!-- default value is 1.72 -->
            <input 
                type="number"
                id="pricePerLiter"
                value="1.72"
                step="0.01"
            >
        </div>

        <!-- liters input -->
        <div class="input-group">

            <label for="liters">
                Number of Liters Purchased
            </label>

            <!-- default value is 0 -->
            <input 
                type="number"
                id="liters"
                value="0"
                step="0.1"
            >
        </div>

        <!-- button section -->
        <div class="button-group">

            <!-- calculate button -->
            <button onclick="calculateTotal()">
                Calculate Total
            </button>

        </div>

        <!-- result display section -->
        <div class="result-box">

            <h2>Total Cost</h2>

            <!-- paragraph to show result -->
            <p id="result">SR 0.00</p>

        </div>

    </div>

    <!-- connecting javaScript file -->
    <script src="script.js"></script>

</body>
</html>
