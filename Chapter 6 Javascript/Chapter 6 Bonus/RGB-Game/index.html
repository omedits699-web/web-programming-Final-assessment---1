<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Color Guessing Game | Interactive Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Pattern -->
    <div class="background-pattern"></div>
    
    <!-- Main Game Container -->
    <div class="game-container">
        <!-- Game Header -->
        <header class="game-header">
            <div class="header-icon">🎨</div>
            <h1>RGB Guessing Game</h1>
            <p class="subtitle">Test your color recognition skills!</p>
        </header>

        <!-- Game Stats -->
        <div class="game-stats">
            <div class="stat-item">
                <span class="stat-label">❤️ Lives</span>
                <span class="stat-value" id="lives">3</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⭐ Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🎯 Round</span>
                <span class="stat-value" id="round">1</span>
            </div>
        </div>

        <!-- RGB Value Display -->
        <div class="rgb-display">
            <h2>Find this color:</h2>
            <div class="rgb-value" id="rgbValue">rgb(123, 45, 67)</div>
        </div>

        <!-- Color Options -->
        <div class="options-container">
            <div id="options" class="color-options"></div>
        </div>

        <!-- Message Display -->
        <div class="message-container">
            <div class="message-box" id="message">
                <span class="message-icon">🎯</span>
                <span class="message-text">Choose the correct color!</span>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="game-controls">
            <button onclick="startGame()" class="restart-btn">
                <span class="btn-icon">🔄</span>
                Restart Game
            </button>
            <button onclick="showHint()" class="hint-btn">
                <span class="btn-icon">💡</span>
                Hint
            </button>
        </div>

        <!-- Game Over Modal -->
        <div class="game-over-modal" id="gameOverModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎮 Game Over!</h2>
                </div>
                <div class="modal-body">
                    <div class="final-stats">
                        <div class="final-score">
                            <span class="score-label">Final Score:</span>
                            <span class="score-value" id="finalScore">0</span>
                        </div>
                        <div class="performance">
                            <span class="performance-text" id="performanceText">Good effort!</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="startGame()" class="play-again-btn">
                        <span class="btn-icon">🎯</span>
                        Play Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="index.js"></script>
</body>
</html>
