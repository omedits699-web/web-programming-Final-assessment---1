<!DOCTYPE html>
<html>
<head>
    <!-- meta tags for character encoding  -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Color Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- main game container: -->
    <div class="game-container">
        <!-- game header section:-->
        <header class="game-header">
            <h1>RGB Color Game</h1>
            <p>Test your color skills!</p>
        </header>

        <!-- game stats  -->
        <div class="game-stats">
            <div class="stat-item">
                <span>Lives:</span>
                <span id="lives">3</span>
            </div>
            <div class="stat-item">
                <span>Score:</span>
                <span id="score">0</span>
            </div>
            <div class="stat-item">
                <span>Round:</span>
                <span id="round">1</span>
                <span class="stat-label">🎯 Round</span>
                <span class="stat-value" id="round">1</span>
            </div>
        </div>

        <!-- rgb value display -->
        <div class="rgb-display">
            <h2>Find this color:</h2>
            <div class="rgb-value" id="rgbValue">rgb(123, 45, 67)</div>
        </div>

        <!-- color options -->
        <div class="options-container">
            <div id="options" class="color-options"></div>
        </div>

        <!-- message display -->
        <div class="message-container">
            <div class="message-box" id="message">
                <span class="message-icon">🎯</span>
                <span class="message-text">Choose the correct color!</span>
            </div>
        </div>

        <!-- game controls -->
        <div class="game-controls">
            <button onclick="startGame()" class="restart-btn">
                <span class="btn-icon">🔄</span>
                Restart Game
            </button>
            <button onclick="showHint()" class="hint-btn">
                <span class="btn-icon">💡</span>
                Hint
            </button>
        </div>

        <!-- game over modal -->
        <div class="game-over-modal" id="gameOverModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎮 Game Over!</h2>
                </div>
                <div class="modal-body">
                    <div class="final-stats">
                        <div class="final-score">
                            <span class="score-label">Final Score:</span>
                            <span class="score-value" id="finalScore">0</span>
                        </div>
                        <div class="performance">
                            <span class="performance-text" id="performanceText">Good effort!</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="startGame()" class="play-again-btn">
                        <span class="btn-icon">🎯</span>
                        Play Again
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- javaScript -->
    <script src="index.js"></script>
</body>
</html>
